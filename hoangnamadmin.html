<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin Panel - VIP 15s</title>
  <style>
    :root {
      --bg-color: #f4f7f6;
      --card-bg: #ffffff;
      --text-main: #2c3e50;
      --text-muted: #7f8c8d;
      --primary: #4361ee;
      --primary-hover: #3a53d0;
      --success: #2ecc71;
      --success-hover: #27ae60;
      --danger: #ff4757;
      --danger-hover: #ff6b81;
      --border-radius: 16px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: var(--bg-color);
      padding: 20px 15px;
      box-sizing: border-box;
      color: var(--text-main);
    }

    .container, .history-container {
      background-color: var(--card-bg);
      padding: 30px 25px;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 450px;
      box-sizing: border-box;
      margin-bottom: 25px;
      transition: transform 0.3s ease;
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid #e1e5eb;
      border-radius: 12px;
      box-sizing: border-box;
      margin-bottom: 20px;
      transition: all 0.3s ease;
      background-color: #f8f9fa;
      color: #333;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      background-color: #fff;
      box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.15);
    }

    .input-help {
      margin-top: -12px;
      margin-bottom: 18px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.45;
    }

    button {
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.7; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    .btn-primary { background: linear-gradient(135deg, var(--primary), #3f37c9); }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 20px rgba(67, 97, 238, 0.4); transform: translateY(-2px); }

    .btn-success { background: linear-gradient(135deg, var(--success), #20bf6b); }
    .btn-success:hover { box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4); transform: translateY(-2px); }

    .btn-danger { background: linear-gradient(135deg, var(--danger), #ff6b81); }
    .btn-danger:hover { box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4); transform: translateY(-2px); }

    #result { margin-top: 25px; border-top: 1px dashed #dcdde1; padding-top: 25px; }

    .result-meta {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .countdown {
      color: var(--danger);
      font-weight: 700;
      font-size: 15px;
      margin-top: 15px;
      background: rgba(255, 71, 87, 0.1);
      padding: 10px;
      border-radius: 8px;
    }

    .history-header-main {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; border-bottom: 2px solid #f1f2f6; padding-bottom: 15px;
    }
    .history-header-main h2 { margin: 0; text-align: left; }

    .history-item {
      background: #ffffff; padding: 15px; border-radius: 12px; margin-bottom: 15px;
      border: 1px solid #f1f2f6; border-left: 5px solid var(--primary);
      display: flex; flex-direction: column; gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02); transition: all 0.3s ease;
    }
    .history-item:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .history-item.expired { border-left-color: var(--text-muted); opacity: 0.7; }

    .history-info {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      font-weight: 600;
    }

    .history-name { display: block; }
    .history-meta { font-size: 13px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }

    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap; }
    .status-active { background: rgba(46, 204, 113, 0.1); color: var(--success); }
    .status-expired { background: rgba(127, 140, 141, 0.1); color: var(--text-muted); }

    .history-actions { display: flex; gap: 10px; }
    .btn-small { padding: 10px; font-size: 14px; flex: 1; border-radius: 8px; box-shadow: none;}
  </style>
</head>
<body>

<div class="container">
  <h2>⚙️ Tạo Link Mobileconfig</h2>
  <input id="name" placeholder="Nhập tên khách hàng..." autocomplete="off" />
  <input id="ttlMinutes" type="number" min="1" step="1" placeholder="Nhập thời gian sống của link (phút)..." autocomplete="off" />
  <select id="linkType" style="width: 100%; padding: 14px 16px; font-size: 16px; border: 1px solid #e1e5eb; border-radius: 12px; box-sizing: border-box; margin-bottom: 20px; background-color: #f8f9fa; color: #333;">
    <option value="download">Link 1 - Unlock Locket 15s</option>
    <option value="download2">Link 2 - DNS Giữ Locket Gold</option>
  </select>
  <div class="input-help">Không còn tự động 15 phút nữa. Giờ admin tự nhập thủ công số phút muốn link sống, rồi chọn loại link cần tạo.</div>
  <button id="createBtn" class="btn-primary" onclick="createLink()">Tạo Liên Kết Mới</button>

  <div id="result" style="display: none;"></div>
</div>

<div class="history-container">
  <div class="history-header-main">
    <h2 style="font-size: 18px;">📋 Lịch sử tạo link</h2>
    <button onclick="clearHistory()" class="btn-danger" style="width: auto; padding: 8px 15px; font-size: 13px; border-radius: 8px; box-shadow: none;">Xoá Tất Cả</button>
  </div>
  <div id="historyList"></div>
</div>

<script>
let countdownTimer;
document.addEventListener("DOMContentLoaded", renderHistory);

function safeDecodeBase64(str) {
  try { return decodeURIComponent(escape(atob(str))); }
  catch(e) { return atob(str); }
}

function formatDuration(minutes) {
  const totalMinutes = Number(minutes) || 0;
  if (totalMinutes < 60) return totalMinutes + " phút";

  const hours = Math.floor(totalMinutes / 60);
  const remainMinutes = totalMinutes % 60;
  if (!remainMinutes) return hours + " giờ";
  return hours + " giờ " + remainMinutes + " phút";
}

function formatDateTime(timestamp) {
  return new Date(timestamp).toLocaleString("vi-VN");
}

async function createLink() {
  const nameInput = document.getElementById("name");
  const ttlInput = document.getElementById("ttlMinutes");
  const linkTypeInput = document.getElementById("linkType");
  const btn = document.getElementById("createBtn");

  const name = nameInput.value.trim();
  const ttlMinutes = Number(ttlInput.value);
  const linkType = linkTypeInput.value;

  if (!name) {
    alert("Vui lòng nhập tên khách hàng!");
    return;
  }

  if (!Number.isFinite(ttlMinutes) || ttlMinutes <= 0) {
    alert("Vui lòng nhập thời gian sống hợp lệ, lớn hơn 0 phút!");
    ttlInput.focus();
    return;
  }

  btn.innerHTML = "⏳ Đang tạo...";
  btn.disabled = true;

  try {
    const res = await fetch("/api/create", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ name, ttlMinutes })
    });

    const rawText = await res.text();
    let data;

    try {
      data = JSON.parse(rawText);
    } catch {
      throw new Error("API trả về dữ liệu không hợp lệ.");
    }

    if (!res.ok) {
      throw new Error(data.error || ("API đang lỗi (" + res.status + ")"));
    }

    if (!data || !data.data) {
      throw new Error("Không lấy được dữ liệu từ hệ thống.");
    }

    const routeMap = {
      download: { path: "/download.html", label: "Link 1 - Unlock Locket 15s" },
      download2: { path: "/download2.html", label: "Link 2 - DNS Giữ Locket Gold" }
    };
    const selectedRoute = routeMap[linkType] || routeMap.download;
    const fullLink = location.origin + selectedRoute.path + "?data=" + encodeURIComponent(data.data);
    const decodedData = JSON.parse(safeDecodeBase64(data.data));
    const expTime = decodedData.exp;
    const createdAt = Date.now();
    const ttlText = formatDuration(decodedData.ttlMinutes || ttlMinutes);

    const resultDiv = document.getElementById("result");
    resultDiv.style.display = "block";
    resultDiv.innerHTML = `
      <div class="result-meta">
        <div><span style="font-size: 14px; color: var(--text-muted);">Khách hàng:</span> <b>${name}</b></div>
        <div><span style="font-size: 14px; color: var(--text-muted);">Loại link:</span> <b>${selectedRoute.label}</b></div>
        <div><span style="font-size: 14px; color: var(--text-muted);">Thời gian sống:</span> <b>${ttlText}</b></div>
        <div><span style="font-size: 14px; color: var(--text-muted);">Hết hạn lúc:</span> <b>${formatDateTime(expTime)}</b></div>
      </div>
      <input value="${fullLink}" id="linkInput" readonly style="margin-bottom: 15px; background: #fff;" />
      <button onclick="copyLink()" class="btn-success">📋 Copy Link Tải</button>
      <div id="timeRemaining" class="countdown">⏳ Đang tính thời gian...</div>
    `;

    startCountdown(expTime);
    saveToHistory(name, fullLink, expTime, decodedData.ttlMinutes || ttlMinutes, createdAt, linkType, selectedRoute.label);
    nameInput.value = "";
    ttlInput.value = "";
    linkTypeInput.value = "download";

  } catch (err) {
    alert("❌ Lỗi: " + err.message);
  } finally {
    btn.innerHTML = "Tạo Liên Kết Mới";
    btn.disabled = false;
  }
}

function saveToHistory(name, link, expTime, ttlMinutes, createdAt, linkType, linkLabel) {
  let history = JSON.parse(localStorage.getItem("linkHistory") || "[]");
  history.unshift({ name, link, expTime, ttlMinutes, createdAt, linkType, linkLabel });
  localStorage.setItem("linkHistory", JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem("linkHistory") || "[]");
  const listDiv = document.getElementById("historyList");

  if (history.length === 0) {
    listDiv.innerHTML = `
      <div style="text-align: center; padding: 30px 0; color: var(--text-muted);">
        <div style="font-size: 40px; margin-bottom: 10px;">📭</div>
        Chưa có dữ liệu nào
      </div>`;
    return;
  }

  listDiv.innerHTML = "";
  history.forEach((item, index) => {
    const isExpired = Date.now() > item.expTime;
    const badgeClass = isExpired ? "status-expired" : "status-active";
    const badgeText = isExpired ? "Đã Hết Hạn" : "Đang Hoạt Động";
    const ttlText = formatDuration(item.ttlMinutes || 0);
    const createdText = item.createdAt ? formatDateTime(item.createdAt) : "Không rõ";
    const expiredText = formatDateTime(item.expTime);
    const linkLabel = item.linkLabel || (item.linkType === "download2" ? "Link 2 - DNS Giữ Locket Gold" : "Link 1 - Unlock Locket 15s");

    listDiv.innerHTML += `
      <div class="history-item ${isExpired ? 'expired' : ''}">
        <div class="history-info">
          <div>
            <span class="history-name">🧑‍💻 ${item.name}</span>
            <div class="history-meta">
              🔗 Loại: ${linkLabel}<br>
              ⏱️ Sống: ${ttlText}<br>
              🕒 Tạo: ${createdText}<br>
              ⌛ Hết hạn: ${expiredText}
            </div>
          </div>
          <span class="status-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="history-actions">
          <button class="btn-success btn-small" onclick="copyText('${item.link}')">Copy Link</button>
          <button class="btn-danger btn-small" onclick="deleteHistoryItem(${index})">Xoá</button>
        </div>
      </div>
    `;
  });
}

function deleteHistoryItem(index) {
  let history = JSON.parse(localStorage.getItem("linkHistory") || "[]");
  history.splice(index, 1);
  localStorage.setItem("linkHistory", JSON.stringify(history));
  renderHistory();
}

function clearHistory() {
  if (confirm("⚠️ Bạn có chắc chắn muốn xoá toàn bộ lịch sử? Hành động này không thể hoàn tác.")) {
    localStorage.removeItem("linkHistory");
    renderHistory();
  }
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    alert("✅ Đã copy link thành công!");
  } catch {
    const tempInput = document.createElement("input");
    tempInput.value = text;
    document.body.appendChild(tempInput);
    tempInput.select();
    document.execCommand("copy");
    document.body.removeChild(tempInput);
    alert("✅ Đã copy link thành công!");
  }
}

function copyLink() {
  const input = document.getElementById("linkInput");
  copyText(input.value);
}

function startCountdown(expTime) {
  if (countdownTimer) clearInterval(countdownTimer);
  const display = document.getElementById("timeRemaining");

  countdownTimer = setInterval(() => {
    const now = Date.now();
    const distance = expTime - now;

    if (distance <= 0) {
      clearInterval(countdownTimer);
      display.innerHTML = "❌ Link đã hết hạn!";
      display.style.color = "var(--text-muted)";
      display.style.background = "rgba(127, 140, 141, 0.1)";
      renderHistory();
      return;
    }

    const hours = Math.floor(distance / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);
    const formatMinutes = minutes < 10 && hours > 0 ? "0" + minutes : minutes;
    const formatSeconds = seconds < 10 ? "0" + seconds : seconds;

    display.innerHTML = hours > 0
      ? `⏳ Tự huỷ sau: ${hours}:${formatMinutes}:${formatSeconds}`
      : `⏳ Tự huỷ sau: ${minutes}:${formatSeconds}`;
  }, 1000);
}
</script>

</body>
</html>
