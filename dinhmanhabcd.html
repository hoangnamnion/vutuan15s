<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin Panel - VIP 15s</title>
  <style>
    :root {
      --bg-color: #f4f7f6;
      --card-bg: #ffffff;
      --text-main: #2c3e50;
      --text-muted: #7f8c8d;
      --primary: #4361ee;
      --primary-hover: #3a53d0;
      --success: #2ecc71;
      --success-hover: #27ae60;
      --danger: #ff4757;
      --danger-hover: #ff6b81;
      --border-radius: 16px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: var(--bg-color);
      padding: 20px 15px;
      box-sizing: border-box;
      color: var(--text-main);
    }

    .container, .history-container {
      background-color: var(--card-bg);
      padding: 30px 25px;
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 450px;
      box-sizing: border-box;
      margin-bottom: 25px;
      transition: transform 0.3s ease;
    }

    h2 { 
      margin-top: 0; 
      font-size: 22px; 
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%; 
      padding: 14px 16px; 
      font-size: 16px; 
      border: 1px solid #e1e5eb;
      border-radius: 12px; 
      box-sizing: border-box; 
      margin-bottom: 20px;
      transition: all 0.3s ease;
      background-color: #f8f9fa;
      color: #333;
    }
    input:focus {
      outline: none;
      border-color: var(--primary);
      background-color: #fff;
      box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.15);
    }

    button {
      padding: 14px 20px; 
      font-size: 16px; 
      font-weight: 600; 
      color: #fff;
      border: none; 
      border-radius: 12px; 
      cursor: pointer;
      transition: all 0.2s ease; 
      width: 100%;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.7; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    
    .btn-primary { background: linear-gradient(135deg, var(--primary), #3f37c9); }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 20px rgba(67, 97, 238, 0.4); transform: translateY(-2px); }

    .btn-success { background: linear-gradient(135deg, var(--success), #20bf6b); }
    .btn-success:hover { box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4); transform: translateY(-2px); }

    .btn-danger { background: linear-gradient(135deg, var(--danger), #ff6b81); }
    .btn-danger:hover { box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4); transform: translateY(-2px); }

    #result { margin-top: 25px; border-top: 1px dashed #dcdde1; padding-top: 25px; }
    
    .countdown { 
      color: var(--danger); font-weight: 700; font-size: 15px; margin-top: 15px; 
      background: rgba(255, 71, 87, 0.1); padding: 10px; border-radius: 8px;
    }

    .history-header-main {
      display: flex; justify-content: space-between; align-items: center; 
      margin-bottom: 20px; border-bottom: 2px solid #f1f2f6; padding-bottom: 15px;
    }
    .history-header-main h2 { margin: 0; text-align: left; }

    .history-item {
      background: #ffffff; padding: 15px; border-radius: 12px; margin-bottom: 15px;
      border: 1px solid #f1f2f6; border-left: 5px solid var(--primary); 
      display: flex; flex-direction: column; gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02); transition: all 0.3s ease;
    }
    .history-item:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .history-item.expired { border-left-color: var(--text-muted); opacity: 0.6; }
    
    .history-info { display: flex; justify-content: space-between; align-items: center; font-weight: 600; }
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .status-active { background: rgba(46, 204, 113, 0.1); color: var(--success); }
    .status-expired { background: rgba(127, 140, 141, 0.1); color: var(--text-muted); }

    .history-actions { display: flex; gap: 10px; }
    .btn-small { padding: 10px; font-size: 14px; flex: 1; border-radius: 8px; box-shadow: none;}
  </style>
</head>
<body>

<div class="container">
  <h2>⚙️ Tạo Link Mobileconfig</h2>
  <input id="name" placeholder="Nhập tên khách hàng..." autocomplete="off" />
  <button id="createBtn" class="btn-primary" onclick="createLink()">Tạo Liên Kết Mới</button>
  
  <div id="result" style="display: none;"></div>
</div>

<div class="history-container">
  <div class="history-header-main">
    <h2 style="font-size: 18px;">📋 Lịch sử tạo link</h2>
    <button onclick="clearHistory()" class="btn-danger" style="width: auto; padding: 8px 15px; font-size: 13px; border-radius: 8px; box-shadow: none;">Xoá Tất Cả</button>
  </div>
  <div id="historyList">
    </div>
</div>

<script>
let countdownTimer;
document.addEventListener("DOMContentLoaded", renderHistory);

// Hàm chống lỗi tiếng Việt
function safeDecodeBase64(str) {
  try { return decodeURIComponent(escape(atob(str))); }
  catch(e) { return atob(str); }
}

async function createLink() {
  const nameInput = document.getElementById("name");
  const btn = document.getElementById("createBtn");
  const name = nameInput.value.trim();
  
  if (!name) { alert("Vui lòng nhập tên khách hàng!"); return; }

  // Khóa nút bấm và hiện hiệu ứng tải
  btn.innerHTML = "⏳ Đang tạo...";
  btn.disabled = true;

  try {
    const res = await fetch("/api/create", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ name })
    });

    if (!res.ok) throw new Error("API đang lỗi (" + res.status + "), vui lòng chờ giây lát rồi thử lại.");

    const data = await res.json();
    if (!data || !data.data) throw new Error("Không lấy được dữ liệu từ hệ thống.");

    // Dùng encodeURIComponent để bảo vệ dấu cộng trong base64
    const fullLink = location.origin + "/download.html?data=" + encodeURIComponent(data.data);

    // Dùng safeDecodeBase64 để dịch tiếng Việt chuẩn không bị lỗi Crash
    const decodedData = JSON.parse(safeDecodeBase64(data.data));
    const expTime = decodedData.exp;

    const resultDiv = document.getElementById("result");
    resultDiv.style.display = "block";
    resultDiv.innerHTML = `
      <div style="text-align: left; margin-bottom: 10px;">
          <span style="font-size: 14px; color: var(--text-muted);">Link tải dành cho:</span> 
          <b style="color: var(--text-main); font-size: 16px;">${name}</b>
      </div>
      <input value="${fullLink}" id="linkInput" readonly style="margin-bottom: 15px; background: #fff;" />
      <button onclick="copyLink()" class="btn-success">📋 Copy Link Tải</button>
      <div id="timeRemaining" class="countdown">⏳ Đang tính thời gian...</div>
    `;

    startCountdown(expTime);
    saveToHistory(name, fullLink, expTime);
    nameInput.value = ""; 

  } catch (err) {
    alert("❌ Lỗi: " + err.message);
  } finally {
    // Mở khóa nút bấm
    btn.innerHTML = "Tạo Liên Kết Mới";
    btn.disabled = false;
  }
}

function saveToHistory(name, link, expTime) {
  let history = JSON.parse(localStorage.getItem("linkHistory") || "[]");
  history.unshift({ name, link, expTime });
  localStorage.setItem("linkHistory", JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem("linkHistory") || "[]");
  const listDiv = document.getElementById("historyList");
  
  if (history.length === 0) {
    listDiv.innerHTML = `
      <div style="text-align: center; padding: 30px 0; color: var(--text-muted);">
        <div style="font-size: 40px; margin-bottom: 10px;">📭</div>
        Chưa có dữ liệu nào
      </div>`;
    return;
  }

  listDiv.innerHTML = "";
  history.forEach((item, index) => {
    const isExpired = Date.now() > item.expTime;
    const badgeClass = isExpired ? "status-expired" : "status-active";
    const badgeText = isExpired ? "Đã Hết Hạn" : "Đang Hoạt Động";
    
    listDiv.innerHTML += `
      <div class="history-item ${isExpired ? 'expired' : ''}">
        <div class="history-info">
          <span>🧑‍💻 ${item.name}</span>
          <span class="status-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="history-actions">
          <button class="btn-success btn-small" onclick="copyText('${item.link}')">Copy Link</button>
          <button class="btn-danger btn-small" onclick="deleteHistoryItem(${index})">Xoá</button>
        </div>
      </div>
    `;
  });
}

function deleteHistoryItem(index) {
  let history = JSON.parse(localStorage.getItem("linkHistory") || "[]");
  history.splice(index, 1);
  localStorage.setItem("linkHistory", JSON.stringify(history));
  renderHistory();
}

function clearHistory() {
  if (confirm("⚠️ Bạn có chắc chắn muốn xoá toàn bộ lịch sử? Hành động này không thể hoàn tác.")) {
    localStorage.removeItem("linkHistory");
    renderHistory();
  }
}

function copyText(text) {
  const tempInput = document.createElement("input");
  tempInput.value = text;
  document.body.appendChild(tempInput);
  tempInput.select();
  document.execCommand("copy");
  document.body.removeChild(tempInput);
  alert("✅ Đã copy link thành công!");
}

function copyLink() {
  const input = document.getElementById("linkInput");
  input.select();
  document.execCommand("copy");
  alert("✅ Đã copy link thành công!");
}

function startCountdown(expTime) {
  if (countdownTimer) clearInterval(countdownTimer);
  const display = document.getElementById("timeRemaining");

  countdownTimer = setInterval(() => {
    const now = Date.now();
    const distance = expTime - now;

    if (distance <= 0) {
      clearInterval(countdownTimer);
      display.innerHTML = "❌ Link đã hết hạn!";
      display.style.color = "var(--text-muted)";
      display.style.background = "rgba(127, 140, 141, 0.1)";
      renderHistory(); 
      return;
    }

    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);
    const formatSeconds = seconds < 10 ? "0" + seconds : seconds;

    display.innerHTML = `⏳ Tự huỷ sau: ${minutes}:${formatSeconds}`;
  }, 1000);
}
</script>

</body>
</html>
