
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin DNS Locket - Hyper Tech</title>
    <!-- Thư viện CSS Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Thư viện React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- BỘ ICON (Thay thế cho Lucide React để chạy thẳng trên HTML) ---
        const ShieldCheck = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/></svg>);
        const Users = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>);
        const Settings = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>);
        const CalendarClock = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 7.5V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h3.5"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h5"/><path d="M17.5 17.5 16 16.25V14"/><circle cx="16" cy="16" r="6"/></svg>);
        const FileCode2 = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"/><polyline points="14 2 14 8 20 8"/><path d="m9 18 3-3-3-3"/><path d="m5 12-3 3 3 3"/></svg>);
        const Download = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>);
        const Clock = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>);
        const Wifi = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" x2="12.01" y1="20" y2="20"/></svg>);
        const History = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>);
        const Trash2 = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>);
        const LinkIcon = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>);
        const Copy = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>);
        const CheckCircle2 = ({className}) => (<svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>);

        // --- CẤU HÌNH XML GỐC ---
        const XML_GOLD = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
  <dict>
    <key>PayloadDisplayName</key>
    <string>dinhmanhDZ - DNS</string>
    <key>PayloadDescription</key>
    <string>-Đình Mạnh_TNOAA\n-Hyper Tech_hypertechvn</string>
    <key>PayloadIdentifier</key>
    <string>io.nextdns.4c9e16.profile</string>
    <key>PayloadScope</key>
    <string>System</string>
    <key>PayloadType</key>
    <string>Configuration</string>
    <key>PayloadUUID</key>
    <string>A1E2F262-DB73-40F6-BD22-2E42A43A3C94.4c9e16</string>
    <key>PayloadVersion</key>
    <integer>1</integer>
    <key>PayloadContent</key>
    <array>
      <dict>
        <key>DNSSettings</key>
        <dict>
          <key>DNSProtocol</key>
          <string>HTTPS</string>
          <key>ServerURL</key>
          <string>https://apple.dns.nextdns.io/4c9e16</string>
        </dict>
        <key>OnDemandRules</key>
        <array>
          <dict>
            <key>Action</key>
            <string>EvaluateConnection</string>
            <key>ActionParameters</key>
            <array>
              <dict>
                <key>DomainAction</key>
                <string>NeverConnect</string>
                <key>Domains</key>
                <array>
                  <string>captive.apple.com</string>
                  <string>dav.orange.fr</string>
                  <string>vvm.mobistar.be</string>
                  <string>vvm.mstore.msg.t-mobile.com</string>
                  <string>tma.vvm.mone.pan-net.eu</string>
                  <string>vvm.ee.co.uk</string>
                </array>
              </dict>
            </array>
          </dict>
          <dict>
            <key>Action</key>
            <string>Connect</string>
          </dict>
        </array>
        <key>PayloadType</key>
        <string>com.apple.dnsSettings.managed</string>
        <key>PayloadIdentifier</key>
        <string>io.nextdns.4c9e16.profile.dnsSettings.managed</string>
        <key>PayloadUUID</key>
        <string>A1E2F262-DB73-40F6-BD22-2E42A43A3C94.4c9e16.dnsSettings.managed</string>
        <key>PayloadDisplayName</key>
        <string>LOCKET GOLD Hyper Tech</string>
        <key>PayloadOrganization</key>
        <string>Hyper Tech</string>
        <key>PayloadVersion</key>
        <integer>1</integer>
      </dict>
    </array>
  </dict>
</plist>`;

        const XML_VPN_15S = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>PayloadContent</key>
  <array>
    <dict>
      <key>DNSSettings</key>
      <dict>
        <key>DNSProtocol</key>
        <string>HTTPS</string>
        <key>ServerURL</key>
        <string>https://dns.nextdns.io/aa5bc2/</string>
        <key>ServerAddresses</key>
        <array>
          <string>45.90.28.0</string>
          <string>45.90.30.0</string>
          <string>2a07:a8c0::</string>
          <string>2a07:a8c1::</string>
        </array>
      </dict>
      <key>OnDemandEnabled</key>
      <integer>1</integer>
      <key>PayloadDescription</key>
      <string>Bản quyền DNS thuộc về Hyper Tech</string>
      <key>PayloadDisplayName</key>
      <string>Locket User 15s - dimanh</string>
      <key>PayloadIdentifier</key>
      <string>com.nextdns.profile.aa5bc2.dimanh</string>
      <key>PayloadType</key>
      <string>com.apple.dnsSettings.managed</string>
      <key>PayloadUUID</key>
      <string>bfeb329a-77ec-444a-9616-12533810a81e</string>
      <key>PayloadVersion</key>
      <integer>1</integer>
    </dict>
  </array>
  <key>PayloadDescription</key>
  <string>Mô tả:
• Locket Gold Hyper Tech
• TNOAA-Đình Mạnh
• Locket Gold 15s</string>
  <key>PayloadDisplayName</key>
  <string>Locket User 15s - dimanh</string>
  <key>PayloadIdentifier</key>
  <string>com.nextdns.profile.aa5bc2</string>
  <key>PayloadRemovalDisallowed</key>
  <false/>
  <key>PayloadType</key>
  <string>Configuration</string>
  <key>PayloadUUID</key>
  <string>81e8e813-f9f5-4117-b545-1d66f9f4aa1b</string>
  <key>PayloadVersion</key>
  <integer>1</integer>
</dict>
</plist>`;

        function App() {
          const [dnsType, setDnsType] = useState('gold');
          const [customerName, setCustomerName] = useState('');
          const [profileName, setProfileName] = useState('dinhmanhDZ - DNS');
          const [expireMinutes, setExpireMinutes] = useState(5);
          const [calculatedExpireDate, setCalculatedExpireDate] = useState(null);
          const [generatedFile, setGeneratedFile] = useState(null);
          const [history, setHistory] = useState([]);

          const [shareUrl, setShareUrl] = useState('');
          const [isCopied, setIsCopied] = useState(false);
          const [isClientMode, setIsClientMode] = useState(false);
          const [clientParams, setClientParams] = useState(null);

          useEffect(() => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('install') === '1') {
              setIsClientMode(true);
              setClientParams({
                type: params.get('type') || 'gold',
                pname: params.get('pname') || 'Locket Profile',
                expire: params.get('expire')
              });
              return;
            }

            const saved = localStorage.getItem('locket_history');
            if (saved) {
              try {
                setHistory(JSON.parse(saved));
              } catch (e) {
                console.error("Lỗi khi tải lịch sử", e);
              }
            }
          }, []);

          useEffect(() => {
            if (!isClientMode) {
              localStorage.setItem('locket_history', JSON.stringify(history));
            }
          }, [history, isClientMode]);

          const handleGenerate = () => {
            if (!expireMinutes || expireMinutes <= 0) return;

            let modifiedXml = dnsType === 'gold' ? XML_GOLD : XML_VPN_15S;

            modifiedXml = modifiedXml.replace(
              /(<key>PayloadDisplayName<\/key>\s*<string>)(.*?)(<\/string>)/g,
              `$1${profileName}$3`
            );

            const dateObj = new Date();
            dateObj.setMinutes(dateObj.getMinutes() + Number(expireMinutes));
            setCalculatedExpireDate(dateObj);

            const utcDateString = dateObj.toISOString().split('.')[0] + 'Z'; 

            modifiedXml = modifiedXml.replace(
              /(<plist[^>]*>\s*<dict>)/,
              `$1\n    <key>RemovalDate</key>\n    <date>${utcDateString}</date>`
            );

            setGeneratedFile(modifiedXml);

            const baseUrl = window.location.origin + window.location.pathname;
            const generatedLink = `${baseUrl}?install=1&type=${dnsType}&pname=${encodeURIComponent(profileName)}&expire=${encodeURIComponent(utcDateString)}`;
            setShareUrl(generatedLink);

            const newRecord = {
              id: Date.now(),
              customerName: customerName || 'Khách chưa đặt tên',
              dnsType: dnsType === 'gold' ? 'Locket Gold' : 'VPN 15s',
              createdAt: new Date().toISOString(),
              expireAt: dateObj.toISOString(),
              expireMinutes: expireMinutes
            };
            setHistory(prev => [newRecord, ...prev]);
          };

          const handleDownload = () => {
            if (!generatedFile) return;
            const blob = new Blob([generatedFile], { type: 'application/x-apple-aspen-config' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            const fileNameSafe = customerName ? customerName.replace(/[^a-z0-9]/gi, '_').toLowerCase() : 'user';
            link.download = `${fileNameSafe}_locket_dns.mobileconfig`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
          };

          const handleCopyLink = () => {
            if (!shareUrl) return;
            const el = document.createElement('textarea');
            el.value = shareUrl;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            setIsCopied(true);
            setTimeout(() => setIsCopied(false), 2000);
          };

          if (isClientMode && clientParams) {
            const handleClientDownload = () => {
              let xml = clientParams.type === 'gold' ? XML_GOLD : XML_VPN_15S;
              xml = xml.replace(/(<key>PayloadDisplayName<\/key>\s*<string>)(.*?)(<\/string>)/g, `$1${clientParams.pname}$3`);
              if (clientParams.expire) {
                xml = xml.replace(/(<plist[^>]*>\s*<dict>)/, `$1\n    <key>RemovalDate</key>\n    <date>${clientParams.expire}</date>`);
              }
              const blob = new Blob([xml], { type: 'application/x-apple-aspen-config' });
              const url = URL.createObjectURL(blob);
              const link = document.createElement('a');
              link.href = url;
              link.download = `locket_${clientParams.type}.mobileconfig`;
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
              URL.revokeObjectURL(url);
            };

            return (
              <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4 font-sans text-slate-800">
                <div className="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full text-center border border-slate-200">
                  <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-6 shadow-inner">
                    <ShieldCheck className="w-8 h-8" />
                  </div>
                  <h1 className="text-2xl font-bold text-slate-900 mb-2">Cài đặt Cấu hình</h1>
                  <p className="text-slate-500 text-sm mb-6">Bạn được mời cài đặt cấu hình mạng an toàn từ Hyper Tech.</p>
                  
                  <div className="bg-slate-50 rounded-xl p-4 mb-8 text-left border border-slate-100">
                    <p className="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">Tên Profile</p>
                    <p className="font-semibold text-slate-700 mb-3">{clientParams.pname}</p>
                    
                    <p className="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">Loại</p>
                    <p className="font-semibold text-slate-700">{clientParams.type === 'gold' ? 'Locket Gold' : 'VPN 15s'}</p>
                  </div>

                  <button 
                    onClick={handleClientDownload}
                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-blue-500/30 transition-all flex items-center justify-center gap-2 mb-4"
                  >
                    <Download className="w-5 h-5" />
                    Tải DNS Về Máy
                  </button>
                  
                  <p className="text-xs text-slate-400">
                    * Sau khi tải xong, hãy vào <strong className="text-slate-500">Cài đặt</strong> trên iPhone để cài đặt hồ sơ.
                  </p>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans text-slate-800">
              <aside className="w-full md:w-64 bg-slate-900 text-white flex flex-col">
                <div className="p-6 flex items-center gap-3 border-b border-slate-800">
                  <ShieldCheck className="text-blue-400 w-8 h-8" />
                  <div>
                    <h1 className="font-bold text-lg leading-tight">Hyper Tech</h1>
                    <p className="text-xs text-slate-400">Admin Portal</p>
                  </div>
                </div>
                <nav className="flex-1 p-4 space-y-2">
                  <a href="#" className="flex items-center gap-3 px-4 py-3 bg-blue-600 rounded-lg text-sm font-medium transition-colors">
                    <Users className="w-5 h-5" />
                    Cấp Profile Locket
                  </a>
                  <a href="#" className="flex items-center gap-3 px-4 py-3 hover:bg-slate-800 rounded-lg text-sm font-medium text-slate-300 transition-colors">
                    <Settings className="w-5 h-5" />
                    Cấu hình gốc
                  </a>
                </nav>
                <div className="p-4 border-t border-slate-800 text-xs text-slate-500 text-center">
                  v1.0.0 © Đình Mạnh-TNOAAdev
                </div>
              </aside>

              <main className="flex-1 p-6 lg:p-10 overflow-y-auto">
                <header className="mb-8">
                  <h2 className="text-2xl font-bold text-slate-800">Tạo Profile Locket Có Thời Hạn</h2>
                  <p className="text-slate-500 mt-1">Cấu hình sẽ tự động gỡ bỏ khỏi máy người dùng khi đến hạn.</p>
                </header>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h3 className="text-lg font-semibold flex items-center gap-2 mb-6 border-b pb-4">
                      <Users className="w-5 h-5 text-blue-500" />
                      Thông tin khách hàng
                    </h3>
                    
                    <div className="space-y-5">
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-2 flex items-center gap-2">
                          <Wifi className="w-4 h-4 text-blue-500" />
                          Loại cấu hình DNS
                        </label>
                        <div className="grid grid-cols-2 gap-3">
                          <button
                            onClick={() => setDnsType('gold')}
                            className={`py-3 px-4 rounded-xl border flex flex-col items-center justify-center gap-1 transition-all ${dnsType === 'gold' ? 'border-blue-500 bg-blue-50 text-blue-700 font-semibold ring-1 ring-blue-500' : 'border-slate-200 hover:border-blue-300 text-slate-600'}`}
                          >
                            <span className="text-sm">Giữ Locket Gold</span>
                          </button>
                          <button
                            onClick={() => setDnsType('vpn')}
                            className={`py-3 px-4 rounded-xl border flex flex-col items-center justify-center gap-1 transition-all ${dnsType === 'vpn' ? 'border-blue-500 bg-blue-50 text-blue-700 font-semibold ring-1 ring-blue-500' : 'border-slate-200 hover:border-blue-300 text-slate-600'}`}
                          >
                            <span className="text-sm">Giữ VPN 15s</span>
                          </button>
                        </div>
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Tên khách hàng</label>
                        <input 
                          type="text" 
                          value={customerName}
                          onChange={(e) => setCustomerName(e.target.value)}
                          placeholder="VD: Nguyen Van A"
                          className="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                        />
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Tên Profile (Hiển thị trên máy khách)</label>
                        <input 
                          type="text" 
                          value={profileName}
                          onChange={(e) => setProfileName(e.target.value)}
                          className="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                        />
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-2">
                          <CalendarClock className="w-4 h-4 text-orange-500" />
                          Thời gian hết hạn (Phút)
                        </label>
                        <div className="relative">
                          <input 
                            type="number" 
                            min="1"
                            value={expireMinutes}
                            onChange={(e) => setExpireMinutes(e.target.value)}
                            className="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all pr-16"
                          />
                          <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 font-medium text-sm">phút</span>
                        </div>
                        <p className="text-xs text-slate-500 mt-2">
                          * Nhập số phút hệ thống sẽ tự động gỡ. VD: 5 = 5 phút tính từ lúc bấm tạo.
                        </p>
                      </div>

                      <div className="pt-4">
                        <button 
                          onClick={handleGenerate}
                          className="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl shadow-md shadow-blue-500/30 transition-all flex items-center justify-center gap-2"
                        >
                          <FileCode2 className="w-5 h-5" />
                          Tạo DNS
                        </button>
                      </div>
                    </div>
                  </div>

                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col">
                    <h3 className="text-lg font-semibold flex items-center gap-2 mb-6 border-b pb-4">
                      <Download className="w-5 h-5 text-emerald-500" />
                      Kết quả xuất File
                    </h3>

                    {generatedFile ? (
                      <div className="flex-1 flex flex-col">
                        <div className="bg-slate-900 rounded-xl p-4 flex-1 overflow-y-auto relative group max-h-48">
                          <pre className="text-xs text-emerald-400 font-mono whitespace-pre-wrap">
                            {generatedFile}
                          </pre>
                        </div>
                        
                        <div className="mt-6">
                          <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-4 mb-4">
                            <p className="text-sm text-emerald-800 font-medium">
                              ✓ Đã tạo thành công file cho <b>{customerName || 'Khách hàng'}</b>
                            </p>
                            <p className="text-xs text-emerald-600 mt-1">
                              File sẽ tự động biến mất khỏi iPhone vào lúc: {calculatedExpireDate ? calculatedExpireDate.toLocaleString('vi-VN') : ''}
                            </p>
                          </div>
                          
                          {shareUrl && (
                            <div className="mb-4">
                              <label className="block text-sm font-medium text-slate-700 mb-1 flex items-center gap-2">
                                <LinkIcon className="w-4 h-4 text-indigo-500" />
                                Link gửi cho khách tự cài
                              </label>
                              <div className="flex gap-2">
                                <input 
                                  type="text" 
                                  readOnly 
                                  value={shareUrl}
                                  className="flex-1 px-3 py-2 bg-slate-50 text-slate-600 text-sm rounded-lg border border-slate-200 focus:outline-none"
                                />
                                <button 
                                  onClick={handleCopyLink}
                                  className="px-4 py-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-medium rounded-lg transition-colors flex items-center gap-2 whitespace-nowrap"
                                >
                                  {isCopied ? <CheckCircle2 className="w-4 h-4" /> : <Copy className="w-4 h-4" />}
                                  {isCopied ? 'Đã copy' : 'Copy'}
                                </button>
                              </div>
                            </div>
                          )}

                          <button 
                            onClick={handleDownload}
                            className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-medium py-3 rounded-xl shadow-md shadow-emerald-500/30 transition-all flex items-center justify-center gap-2"
                          >
                            <Download className="w-5 h-5" />
                            Tải DNS (Cho Admin)
                          </button>
                        </div>
                      </div>
                    ) : (
                      <div className="flex-1 flex flex-col items-center justify-center text-slate-400 border-2 border-dashed border-slate-200 rounded-xl py-12">
                        <Clock className="w-12 h-12 mb-3 text-slate-300" />
                        <p className="text-sm">Điền thông tin và bấm "Tạo DNS"</p>
                        <p className="text-xs mt-1">File kết quả sẽ hiển thị tại đây</p>
                      </div>
                    )}
                  </div>
                </div>

                <div className="mt-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                  <div className="flex items-center justify-between border-b pb-4 mb-6">
                    <h3 className="text-lg font-semibold flex items-center gap-2">
                      <History className="w-5 h-5 text-indigo-500" />
                      Lịch sử cấp Profile
                    </h3>
                    {history.length > 0 && (
                      <button 
                        onClick={() => setHistory([])}
                        className="text-sm px-3 py-1.5 bg-red-50 text-red-600 hover:bg-red-100 rounded-lg font-medium transition-colors"
                      >
                        Xoá tất cả
                      </button>
                    )}
                  </div>

                  {history.length === 0 ? (
                    <div className="text-center py-10 text-slate-400 text-sm">
                      <History className="w-10 h-10 mx-auto mb-3 opacity-20" />
                      Chưa có dữ liệu lịch sử nào.
                    </div>
                  ) : (
                    <div className="overflow-x-auto">
                      <table className="w-full text-left text-sm whitespace-nowrap">
                        <thead>
                          <tr className="bg-slate-50 text-slate-600">
                            <th className="px-4 py-3 font-medium rounded-l-lg">Khách hàng</th>
                            <th className="px-4 py-3 font-medium">Loại DNS</th>
                            <th className="px-4 py-3 font-medium">Thời gian cấp</th>
                            <th className="px-4 py-3 font-medium">Thời gian tự gỡ</th>
                            <th className="px-4 py-3 font-medium rounded-r-lg text-right">Thao tác</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {history.map((record) => (
                            <tr key={record.id} className="hover:bg-slate-50/50 transition-colors">
                              <td className="px-4 py-4 font-medium text-slate-800">
                                {record.customerName}
                              </td>
                              <td className="px-4 py-4">
                                <span className={`px-2.5 py-1 rounded-full text-xs font-medium ${record.dnsType === 'Locket Gold' ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700'}`}>
                                  {record.dnsType}
                                </span>
                              </td>
                              <td className="px-4 py-4 text-slate-500">
                                {new Date(record.createdAt).toLocaleString('vi-VN')}
                              </td>
                              <td className="px-4 py-4 text-emerald-600 font-medium">
                                {new Date(record.expireAt).toLocaleString('vi-VN')}
                                <span className="text-slate-400 text-xs ml-1">({record.expireMinutes}p)</span>
                              </td>
                              <td className="px-4 py-4 text-right">
                                <button 
                                  onClick={() => setHistory(prev => prev.filter(item => item.id !== record.id))}
                                  className="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                                  title="Xoá lịch sử này"
                                >
                                  <Trash2 className="w-4 h-4" />
                                </button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
